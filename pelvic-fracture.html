<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pelvic Fracture Haemorrhage — Management Algorithm</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #060612; color: #fff;
  font-family: 'Courier New', monospace;
  min-height: 100vh; padding: 16px;
  display: flex; flex-direction: column; align-items: center;
}
.container { width: 100%; max-width: 680px; }
.header { text-align: center; margin-bottom: 20px; padding-top: 8px; }
.header h1 { font-size: 1.1rem; font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase; color: #fb923c; }
.header p { font-size: 0.65rem; color: #4b5563; letter-spacing: 0.2em; text-transform: uppercase; margin-top: 4px; }

.card {
  border-radius: 12px; padding: 16px 18px; margin-bottom: 10px;
  border: 2px solid; background: #0a0a1a;
}
.card h2 { font-size: 1.15rem; font-weight: 900; margin-bottom: 4px; }
.card .subtitle { font-size: 0.72rem; color: #9ca3af; margin-bottom: 12px; }
.badge {
  display: inline-block; font-size: 0.58rem; font-weight: 900;
  letter-spacing: 0.15em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 4px; border: 1px solid; margin-bottom: 8px;
}
.section { font-size: 0.6rem; font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase; margin: 10px 0 6px; color:#6b7280; }
.item { display: flex; align-items: flex-start; gap: 8px; font-size: 0.78rem; margin-bottom: 5px; line-height: 1.5; color:#d1d5db;}
.step { display: flex; align-items: flex-start; gap: 8px; font-size: 0.78rem; margin-bottom: 6px; line-height: 1.5; color:#d1d5db;}
.step-num { font-size: 0.65rem; font-weight: 900; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; margin-top: 1px; }
.pearl { border-radius: 8px; padding: 10px 12px; margin-top: 12px; border: 1px solid; }
.pearl-label { font-size: 0.6rem; font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; }
.pearl p { font-size: 0.76rem; color: #d1d5db; line-height: 1.5; }
.fact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 8px 0; }
.fact-box { border-radius: 6px; padding: 8px 10px; border: 1px solid; }
.fact-label { font-size: 0.55rem; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
.fact-value { font-size: 0.85rem; font-weight: 900; }
.divider { height: 1px; background: #1f2937; margin: 12px 0; }
.options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.opt-btn {
  width: 100%; text-align: left; padding: 12px 16px; border-radius: 8px;
  font-size: 0.78rem; font-weight: 700; font-family: 'Courier New', monospace;
  cursor: pointer; border: 1px solid; transition: all 0.15s; line-height: 1.4;
}
.opt-btn:hover { transform: translateX(3px); }
.btn-red { background: #450a0a; border-color: #dc2626; color: #fca5a5; }
.btn-red:hover { background: #7f1d1d; }
.btn-default { background: #1f2937; border-color: #4b5563; color: #e5e7eb; }
.btn-default:hover { background: #374151; }
.btn-green { background: #052e16; border-color: #16a34a; color: #86efac; }
.btn-green:hover { background: #14532d; }
.btn-orange { background: #431407; border-color: #ea580c; color: #fed7aa; }
.btn-orange:hover { background: #7c2d12; }
.nav { display: flex; gap: 10px; margin-top: 4px; }
.nav-btn { flex: 1; padding: 10px; border-radius: 8px; font-size: 0.78rem; font-weight: 700; font-family: 'Courier New', monospace; cursor: pointer; border: 1px solid; transition: all 0.15s; }
.btn-back { background: #1f2937; border-color: #374151; color: #d1d5db; }
.btn-back:hover { background: #374151; }
.btn-restart { background: #111827; border-color: #1f2937; color: #6b7280; }
.btn-restart:hover { color: #d1d5db; background: #1f2937; }
.breadcrumb { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; min-height: 18px; }
.crumb { font-size: 0.58rem; padding: 2px 7px; border-radius: 10px; background:#1f2937; color:#9ca3af; }
.footer { text-align: center; font-size: 0.58rem; color: #1f2937; letter-spacing: 0.2em; margin-top: 20px; margin-bottom: 8px; }

.pelvis-schematic { display:flex; justify-content:center; margin: 14px 0; }
.pelvis-ring { position:relative; width:180px; height:140px; }
.pelvis-bone { position:absolute; background:#374151; border:2px solid #6b7280; }
.ring-left { width:70px; height:120px; left:0; top:10px; border-radius:50% 10% 10% 50%; }
.ring-right { width:70px; height:120px; right:0; top:10px; border-radius:10% 50% 50% 10%; }
.symphysis { width:14px; height:30px; left:83px; top:55px; background:#6b7280; }
.sacrum { width:46px; height:60px; left:67px; top:0; border-radius:40% 40% 10% 10%; background:#4b5563; }
.label-tag { position:absolute; font-size:0.55rem; color:#9ca3af; white-space:nowrap; }

.class-table { width:100%; border-collapse:collapse; margin: 8px 0; }
.class-table td, .class-table th { padding:6px 8px; font-size:0.68rem; border:1px solid #1f2937; text-align:left; color:#d1d5db; }
.class-table th { background:#111827; color:#9ca3af; font-size:0.6rem; text-transform:uppercase; letter-spacing:0.08em; }

.timeline { position:relative; padding-left:22px; margin:10px 0; }
.timeline::before { content:''; position:absolute; left:6px; top:4px; bottom:4px; width:2px; background:#374151; }
.tl-item { position:relative; margin-bottom:14px; }
.tl-item::before { content:''; position:absolute; left:-22px; top:2px; width:12px; height:12px; border-radius:50%; background:#fb923c; border:2px solid #060612; }
.tl-time { font-size:0.58rem; font-weight:900; color:#fb923c; letter-spacing:0.08em; text-transform:uppercase; }
.tl-text { font-size:0.74rem; color:#d1d5db; line-height:1.5; margin-top:2px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🦴 Pelvic Fracture Haemorrhage</h1>
    <p>Classification · Resuscitation · Source Control · FNB Exit 2026 · Dr. Wilson</p>
  </div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div id="app"></div>
  <div class="footer">ATLS 10TH ED · YOUNG-BURGESS · TILE/AO · EAST GUIDELINES PELVIC HAEMORRHAGE 2011 · DR. WILSON</div>
</div>

<script>
const nodes = {

  start: {
    type: "scenario", color: "#fb923c",
    text: "28M, motorcycle RTA",
    subtitle: "Unstable pelvis on exam · BP 78/45 · HR 145 · FAST negative",
    content: [
      {type:"label", text:"📋 Initial Assessment:"},
      {type:"item", icon:"▸", col:"#fca5a5", text:"Mechanism — high energy, motorcycle"},
      {type:"item", icon:"▸", col:"#fca5a5", text:"Spring test positive — pelvic instability"},
      {type:"item", icon:"▸", col:"#fca5a5", text:"BP 78/45, HR 145 — Class III/IV haemorrhagic shock"},
      {type:"item", icon:"▸", col:"#86efac", text:"FAST negative — abdomen not the obvious source"},
      {type:"label", text:"⚠ Clinical Reasoning:"},
      {type:"item", icon:"▸", col:"#9ca3af", text:"Unstable pelvis + shock + negative FAST → suspect pelvic source until proven otherwise"},
      {type:"item", icon:"▸", col:"#9ca3af", text:"Do NOT repeatedly spring-test the pelvis — each manipulation can dislodge clot and worsen haemorrhage. Test once."}
    ],
    options:[
      {label:"View Pelvic Fracture Classification →", next:"classification"},
      {label:"Skip to Immediate Management →", next:"immediate"}
    ]
  },

  classification: {
    type: "info", color: "#60a5fa",
    text: "PELVIC FRACTURE CLASSIFICATION",
    subtitle: "Young-Burgess (mechanism-based) · Tile/AO (stability-based)",
    content: [
      {type:"label", text:"🩻 Young-Burgess Classification — by mechanism:"}
    ],
    table: {
      headers: ["Pattern", "Mechanism", "Stability", "Bleeding Risk"],
      rows: [
        ["APC (I-III)", "Anteroposterior compression — open book", "I stable, II-III unstable", "APC-III highest — venous plexus + posterior SI disruption"],
        ["LC (I-III)", "Lateral compression", "I-II often stable", "Lower — internal rotation tamponades somewhat"],
        ["VS", "Vertical shear — fall, MVC", "Highly unstable", "High — complete ligamentous disruption"],
        ["CM", "Combined mechanism", "Variable", "Variable"]
      ]
    },
    schematic: "openbook",
    content2: [
      {type:"label", text:"🦴 Tile/AO Classification — by stability:"},
      {type:"item", icon:"▸", col:"#86efac", text:"Type A — Stable. Posterior arch intact. Avulsions, minor fractures."},
      {type:"item", icon:"▸", col:"#facc15", text:"Type B — Rotationally unstable, vertically stable. Partial posterior disruption."},
      {type:"item", icon:"▸", col:"#f87171", text:"Type C — Rotationally AND vertically unstable. Complete posterior arch disruption. Highest haemorrhage risk."}
    ],
    pearl: "Open book (APC) fractures widen the pelvic ring → volume increases → venous plexus and presacral veins torn → massive low-pressure bleeding into an expanded retroperitoneal space. This is exactly why the binder works — it closes the book back up.",
    options:[
      {label:"Continue to Immediate Management →", next:"immediate"}
    ]
  },

  immediate: {
    type: "step", color: "#fb923c",
    text: "STEP 1 — IMMEDIATE INTERVENTION",
    subtitle: "Before imaging, before full workup",
    content: [
      {type:"label", text:"🔧 Pelvic Binder — apply immediately:"},
      {type:"step", n:1, text:"Position at the level of the GREATER TROCHANTERS — not the iliac crest. Incorrect placement significantly reduces effectiveness."},
      {type:"step", n:2, text:"Mechanism 1 — Volume reduction: closes the pelvic ring, reduces the potential space available for blood to accumulate."},
      {type:"step", n:3, text:"Mechanism 2 — Fracture stabilisation: reduces ongoing bleeding from fragment movement, reduces clot disruption, reduces pain."},
      {type:"label", text:"⚡ Simultaneously:"},
      {type:"item", icon:"▸", col:"#fca5a5", text:"Activate MTP — 1:1:1 ratio"},
      {type:"item", icon:"▸", col:"#fca5a5", text:"Large bore IV access ×2, consider IO if access difficult"},
      {type:"item", icon:"▸", col:"#fca5a5", text:"TXA within 3 hours if not already given"},
      {type:"item", icon:"▸", col:"#fca5a5", text:"Permissive hypotension MAP 50–65 until source controlled"}
    ],
    pearl: "Apply the binder BEFORE the CT scanner, before formal X-ray. This is a clinical diagnosis (spring test + mechanism) — don't wait for imaging confirmation to bind an obviously unstable pelvis in a shocked patient.",
    options:[
      {label:"Patient remains unstable despite binder + MTP →", next:"sources"}
    ]
  },

  sources: {
    type: "info", color: "#facc15",
    text: "SOURCES OF PELVIC HAEMORRHAGE",
    subtitle: "Understanding WHY the next decision matters",
    content: [
      {type:"label", text:"📊 Three sources — proportions matter clinically:"}
    ],
    fact_grid: [
      {label:"Venous / Cancellous Bone", value:"~80–90%", color:"#facc15", border:"#facc15"},
      {label:"Arterial", value:"~10–20%", color:"#f87171", border:"#f87171"}
    ],
    content2: [
      {type:"item", icon:"▸", col:"#facc15", text:"Venous plexus + cancellous bone surfaces — LOW PRESSURE, dominant source. Responds to direct tamponade/packing."},
      {type:"item", icon:"▸", col:"#f87171", text:"Arterial — superior gluteal, internal pudendal, obturator branches. HIGH PRESSURE, minority but rapidly fatal if untreated. Requires angioembolisation, not packing."}
    ],
    pearl: "This is the single most important teaching point in pelvic haemorrhage: because venous/bony bleeding dominates (80-90%), and angioembolisation ONLY treats arterial sources, an unstable patient should go straight to PREPERITONEAL PACKING — not angiography — as first-line source control. Angio alone would miss the majority of the bleeding.",
    options:[
      {label:"Continue to Decision Pathway →", next:"decision"}
    ]
  },

  decision: {
    type: "decision", color: "#f87171",
    text: "DECISION: PPP vs ANGIOEMBOLISATION",
    subtitle: "What determines the choice?",
    content: [
      {type:"label", text:"⏱ Time to source control is the deciding factor:"},
      {type:"item", icon:"▸", col:"#9ca3af", text:"PPP — can be done in ED/theatre within 15–20 minutes. Treats the DOMINANT venous source directly."},
      {type:"item", icon:"▸", col:"#9ca3af", text:"Angioembolisation — requires interventional radiology mobilisation. Treats ONLY arterial source. Time an unstable patient often doesn't have."}
    ],
    options:[
      {label:"Patient HAEMODYNAMICALLY UNSTABLE despite binder+MTP", next:"ppp", style:"red"},
      {label:"Patient STABLE / transient responder, contrast blush on CT", next:"angio", style:"orange"}
    ]
  },

  ppp: {
    type: "step", color: "#dc2626",
    text: "PREPERITONEAL PELVIC PACKING (PPP)",
    subtitle: "First-line for haemodynamically unstable patients",
    content: [
      {type:"label", text:"🔪 Technique:"},
      {type:"step", n:1, text:"Midline suprapubic incision, ~6–8cm, just above pubic symphysis."},
      {type:"step", n:2, text:"Enter the PREPERITONEAL space — between peritoneum and pelvic bones. Peritoneum is NEVER opened."},
      {type:"step", n:3, text:"Place 3 laparotomy pads bilaterally — one each side of bladder, deep toward sacroiliac joints (dominant venous plexus location)."},
      {type:"step", n:4, text:"Close fascia over packs. Skin left open or loosely closed."},
      {type:"label", text:"🧠 Why this doesn't worsen bleeding:"},
      {type:"item", icon:"▸", col:"#86efac", text:"Working in a potential space, not dissecting through vascular tissue"},
      {type:"item", icon:"▸", col:"#86efac", text:"Peritoneum stays intact — bowel/mesentery undisturbed"},
      {type:"item", icon:"▸", col:"#86efac", text:"Venous bleeding is low-pressure — direct pack pressure easily exceeds it"},
      {type:"item", icon:"▸", col:"#86efac", text:"Non-targeted — no need to find the specific bleeding vessel, just compress the whole space"},
      {type:"label", text:"💉 Anaesthesia for PPP:"},
      {type:"item", icon:"▸", col:"#fca5a5", text:"GA + RSI — full stomach assumed, shocked patient"},
      {type:"item", icon:"▸", col:"#fca5a5", text:"Ketamine 1mg/kg (reduced dose) — maintains sympathetic tone"},
      {type:"item", icon:"▸", col:"#fca5a5", text:"Rocuronium 1.2mg/kg, video laryngoscopy"},
      {type:"item", icon:"▸", col:"#fca5a5", text:"NOT regional — sympathectomy would cause cardiovascular collapse on top of existing shock"},
      {type:"item", icon:"▸", col:"#fca5a5", text:"Arterial line, large bore access ×2, active warming, TEG/ROTEM if available"}
    ],
    pearl: "Anaesthetic management during PPP is not just 'providing anaesthesia' — the anaesthetist is simultaneously running the MTP and correcting the lethal triad while the surgeon packs. This is a team-critical procedure, not a routine GA.",
    options:[
      {label:"CT post-packing shows persistent contrast blush →", next:"blush"},
      {label:"Bleeding controlled, patient stabilising →", next:"icu_phase"}
    ]
  },

  angio: {
    type: "step", color: "#ea580c",
    text: "ANGIOEMBOLISATION",
    subtitle: "For arterial sources — stable patient or post-PPP blush",
    content: [
      {type:"item", icon:"▸", col:"#fed7aa", text:"Indicated when contrast blush identified on CT — specific arterial target"},
      {type:"item", icon:"▸", col:"#fed7aa", text:"Targets superior gluteal, internal pudendal, or obturator artery branches"},
      {type:"item", icon:"▸", col:"#fed7aa", text:"Does NOT address venous/bony bleeding — must be combined with binder/packing if venous source also active"},
      {type:"item", icon:"▸", col:"#f87171", text:"Requires interventional radiology — time-dependent, not appropriate as sole first response in profoundly unstable patient"}
    ],
    options:[
      {label:"Continue to ICU Resuscitation Phase →", next:"icu_phase"}
    ]
  },

  blush: {
    type: "decision", color: "#facc15",
    text: "PERSISTENT BLUSH AFTER PPP",
    subtitle: "What does this mean?",
    content: [
      {type:"label", text:"🎯 Interpretation:"},
      {type:"item", icon:"▸", col:"#facc15", text:"PPP has controlled the dominant VENOUS source"},
      {type:"item", icon:"▸", col:"#facc15", text:"Persistent blush = an ARTERIAL source remains active — PPP cannot address this"},
      {type:"label", text:"✅ Next step:"},
      {type:"item", icon:"▸", col:"#86efac", text:"Proceed to angioembolisation — now appropriate since patient is more stable post-packing and the target is specific"},
      {type:"item", icon:"▸", col:"#f87171", text:"Laparotomy is NOT automatically required — PPP is extraperitoneal. Laparotomy only if separate intraperitoneal injury identified."}
    ],
    pearl: "PPP and angioembolisation are complementary, not competing — PPP treats the 80-90% (venous), angio treats the residual 10-20% (arterial) that PPP cannot reach. Many patients need both in sequence.",
    options:[
      {label:"Continue to ICU Resuscitation Phase →", next:"icu_phase"}
    ]
  },

  icu_phase: {
    type: "step", color: "#a855f7",
    text: "ICU RESUSCITATION PHASE",
    subtitle: "Correcting the lethal triad — same DCS principles",
    content: [
      {type:"label", text:"🎯 Targets before relook:"}
    ],
    fact_grid: [
      {label:"Temperature", value:">36°C", color:"#4ade80", border:"#4ade80"},
      {label:"pH", value:">7.35", color:"#4ade80", border:"#4ade80"},
      {label:"Lactate", value:"<2 mmol/L", color:"#4ade80", border:"#4ade80"},
      {label:"INR", value:"<1.5", color:"#4ade80", border:"#4ade80"}
    ],
    content2: [
      {type:"item", icon:"▸", col:"#9ca3af", text:"Complete MTP as needed, replace calcium and fibrinogen actively"},
      {type:"item", icon:"▸", col:"#9ca3af", text:"Active warming, ventilation, ongoing monitoring"},
      {type:"item", icon:"▸", col:"#9ca3af", text:"Packs remain in situ during this phase — same principle as abdominal DCL"}
    ],
    options:[
      {label:"Targets met → Continue to Pack Removal & Timeline →", next:"timeline"}
    ]
  },

  timeline: {
    type: "timeline", color: "#fb923c",
    text: "COMPLETE TREATMENT TIMELINE",
    subtitle: "From injury to definitive fixation",
    timeline_items: [
      {time:"Hour 0", text:"Pelvic binder at greater trochanters · MTP activated · TXA if within 3h"},
      {time:"Hour 0–1", text:"Preperitoneal pelvic packing (PPP) if haemodynamically unstable"},
      {time:"Hour 0–6", text:"Angioembolisation if arterial blush identified on CT (pre or post-PPP)"},
      {time:"Hour 0–24", text:"External fixation — temporising orthopaedic stabilisation, mechanical volume reduction, reduces ongoing bleeding"},
      {time:"24–48 Hours", text:"Relook in theatre — pack removal once lethal triad corrected (Temp>36, pH>7.35, Lactate<2, INR<1.5)"},
      {time:"Day 5–14+", text:"Definitive internal fixation (plates/screws) — delayed until soft tissue swelling resolves and patient is fully stable. Safe definitive surgery principle — same logic as TBI extracranial procedure timing."}
    ],
    pearl: "Don't confuse 'pack removal' with 'definitive fixation' — they are different events at different timepoints. The 24-48h relook is about packs and physiology; definitive bone fixation comes later, governed by soft tissue readiness, not just lethal triad correction.",
    options:[
      {label:"🔄 Restart Algorithm", next:"start", restart:true}
    ]
  }

};

let history = [];
let current = "start";

function renderSchematic(type) {
  if (type === "openbook") {
    return '<div class="pelvis-schematic"><div class="pelvis-ring">' +
      '<div class="pelvis-bone sacrum" style="left:67px;"></div>' +
      '<div class="pelvis-bone ring-left" style="transform:rotate(-8deg);"></div>' +
      '<div class="pelvis-bone ring-right" style="transform:rotate(8deg);"></div>' +
      '<div class="pelvis-bone symphysis" style="background:#f87171; width:22px; left:79px;"></div>' +
      '<div class="label-tag" style="top:130px; left:30px; color:#f87171;">↔ widened symphysis (open book)</div>' +
      '</div></div>';
  }
  return '';
}

function renderTable(table) {
  let html = '<table class="class-table"><tr>';
  table.headers.forEach(function(h) { html += '<th>' + h + '</th>'; });
  html += '</tr>';
  table.rows.forEach(function(row) {
    html += '<tr>';
    row.forEach(function(cell) { html += '<td>' + cell + '</td>'; });
    html += '</tr>';
  });
  html += '</table>';
  return html;
}

function renderContentList(content) {
  let html = '';
  content.forEach(function(c) {
    if (c.type === "label") {
      html += '<div class="section">' + c.text + '</div>';
    } else if (c.type === "item") {
      html += '<div class="item"><span style="color:' + c.col + '">' + c.icon + '</span><span>' + c.text + '</span></div>';
    } else if (c.type === "step") {
      html += '<div class="step"><span class="step-num" style="background:#1f2937;color:#fb923c;">' + c.n + '</span><span>' + c.text + '</span></div>';
    }
  });
  return html;
}

function render() {
  const node = nodes[current];
  const app = document.getElementById('app');
  const borderColor = node.color;

  let html = '<div class="card" style="border-color:' + borderColor + '">';
  html += '<div class="badge" style="border-color:' + borderColor + '; color:' + borderColor + ';">' + node.type + '</div>';
  html += '<h2 style="color:' + borderColor + '">' + node.text + '</h2>';
  if (node.subtitle) html += '<div class="subtitle">' + node.subtitle + '</div>';

  if (node.content) html += renderContentList(node.content);
  if (node.table) html += renderTable(node.table);
  if (node.schematic) html += renderSchematic(node.schematic);
  if (node.content2) html += renderContentList(node.content2);

  if (node.fact_grid) {
    html += '<div class="fact-grid">';
    node.fact_grid.forEach(function(f) {
      html += '<div class="fact-box" style="border-color:' + f.border + '"><div class="fact-label" style="color:' + f.color + '">' + f.label + '</div><div class="fact-value" style="color:' + f.color + '">' + f.value + '</div></div>';
    });
    html += '</div>';
  }

  if (node.timeline_items) {
    html += '<div class="timeline">';
    node.timeline_items.forEach(function(t) {
      html += '<div class="tl-item"><div class="tl-time">' + t.time + '</div><div class="tl-text">' + t.text + '</div></div>';
    });
    html += '</div>';
  }

  if (node.pearl) {
    html += '<div class="pearl" style="border-color:' + borderColor + '; background:' + borderColor + '11;">' +
      '<div class="pearl-label" style="color:' + borderColor + '">💡 Key Concept</div>' +
      '<p>' + node.pearl + '</p></div>';
  }

  html += '</div>';

  html += '<div class="options">';
  node.options.forEach(function(opt) {
    let btnClass = 'btn-default';
    if (opt.style === 'red') btnClass = 'btn-red';
    if (opt.style === 'orange') btnClass = 'btn-orange';
    if (opt.style === 'green') btnClass = 'btn-green';
    html += '<button class="opt-btn ' + btnClass + '" onclick="goTo(\'' + opt.next + '\', ' + (!!opt.restart) + ')">' + opt.label + '</button>';
  });
  html += '</div>';

  html += '<div class="nav">';
  if (history.length > 0) {
    html += '<button class="nav-btn btn-back" onclick="goBack()">← Back</button>';
  }
  html += '<button class="nav-btn btn-restart" onclick="restart()">⟲ Restart</button>';
  html += '</div>';

  app.innerHTML = html;
  renderBreadcrumb();
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let html = '';
  history.concat([current]).forEach(function(key) {
    html += '<span class="crumb">' + nodes[key].text.split(' ').slice(0,2).join(' ') + '</span>';
  });
  bc.innerHTML = html;
}

function goTo(key, isRestart) {
  if (isRestart) { restart(); return; }
  history.push(current);
  current = key;
  window.scrollTo(0,0);
  render();
}

function goBack() {
  if (history.length > 0) {
    current = history.pop();
    window.scrollTo(0,0);
    render();
  }
}

function restart() {
  history = [];
  current = "start";
  window.scrollTo(0,0);
  render();
}

render();
</script>
</body>
</html>
